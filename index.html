<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enlighten Life</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f7f1e8;color:#2d2923;font-family:Georgia,"Noto Serif KR",serif;line-height:1.8}
a{text-decoration:none;color:inherit}
header{padding:80px 22px 65px;text-align:center;background:linear-gradient(#eadfce,#faf5ed)}
header h1{font-size:58px;line-height:1;margin:0}
header p{font-size:17px;color:#6b6258}
nav{position:sticky;top:0;background:#fffaf3;border-bottom:1px solid #e5d8c8;text-align:center;padding:12px 6px;z-index:5}
nav button{border:0;background:none;margin:4px 7px;font-size:14px;color:#443d35}
main{max-width:920px;margin:auto;padding:34px 18px}
.grid{display:grid;grid-template-columns:1fr;gap:22px}
.card{background:#fffaf3;border-radius:24px;padding:24px;box-shadow:0 10px 26px rgba(70,50,30,.07)}
.card small{color:#9a8f83}
.card h2{font-size:24px;line-height:1.35;margin:10px 0}
.card p{color:#6b6258;font-size:15px}
.tag{font-size:13px;color:#8a6f52}
.article{display:none;background:#fffaf3;border-radius:24px;padding:28px;margin-top:24px}
.article h1{font-size:34px;line-height:1.3}
.article .body{white-space:pre-line;font-size:18px}
.back{margin-top:30px;color:#8a6f52}
footer{text-align:center;color:#9a8f83;font-size:13px;padding:40px}
@media(min-width:720px){.grid{grid-template-columns:1fr 1fr}header h1{font-size:76px}}
</style>
</head>

<body>

<header>
<h1>Enlighten<br>Life</h1>
<p>삶 전체가 명상이 되는 길</p>
<p>명상 · 커피 · 부모님 · 생의 여행 · 시와 언어</p>
</header>

<nav>
<button onclick="filterPosts('all')">전체</button>
<button onclick="filterPosts('명상')">명상</button>
<button onclick="filterPosts('커피')">커피</button>
<button onclick="filterPosts('부모님')">부모님</button>
<button onclick="filterPosts('생의 여행')">생의 여행</button>
<button onclick="filterPosts('시와 언어')">시와 언어</button>
</nav>

<main>
<section id="list" class="grid"></section>
<section id="article" class="article"></section>
</main>

<footer>
Enlighten Life · 삶 전체가 명상이 되는 길
</footer>

<script>
const POSTS = [
  {
    title: "명상이란 무엇인가",
    category: "명상",
    date: "2026.06.20",
    excerpt: "여기에 짧은 소개문을 씁니다.",
    body: `여기에 본문을 씁니다.

줄바꿈도 그대로 적용됩니다.

글은 선생님이 직접 넣으면 됩니다.`
  },
  {
    title: "커피가 내 삶에 들어오던 날",
    category: "커피",
    date: "2026.06.20",
    excerpt: "여기에 짧은 소개문을 씁니다.",
    body: `여기에 본문을 씁니다.`
  },
  {
    title: "내가 처음으로 선택한 두 사람",
    category: "부모님",
    date: "2026.06.20",
    excerpt: "여기에 짧은 소개문을 씁니다.",
    body: `여기에 본문을 씁니다.`
  },
  {
    title: "시작도 끝도 없는 시간 속에서",
    category: "생의 여행",
    date: "2026.06.20",
    excerpt: "여기에 짧은 소개문을 씁니다.",
    body: `여기에 본문을 씁니다.`
  },
  {
    title: "시",
    category: "시와 언어",
    date: "2026.06.20",
    excerpt: "여기에 짧은 소개문을 씁니다.",
    body: `여기에 본문을 씁니다.`
  }
];

let current = POSTS;

function renderList(posts){
  document.getElementById("article").style.display="none";
  const list=document.getElementById("list");
  list.style.display="grid";
  list.innerHTML=posts.map((post,i)=>`
    <a class="card" onclick="openPost(${POSTS.indexOf(post)})">
      <small>${post.date} · ${post.category}</small>
      <h2>${post.title}</h2>
      <p>${post.excerpt}</p>
      <div class="tag">계속 읽기 →</div>
    </a>
  `).join("");
}

function filterPosts(category){
  current = category==="all" ? POSTS : POSTS.filter(p=>p.category===category);
  renderList(current);
}

function openPost(index){
  const post=POSTS[index];
  document.getElementById("list").style.display="none";
  const article=document.getElementById("article");
  article.style.display="block";
  article.innerHTML=`
    <small>${post.date} · ${post.category}</small>
    <h1>${post.title}</h1>
    <div class="body">${post.body}</div>
    <div class="back" onclick="renderList(current)">← 목록으로 돌아가기</div>
  `;
  window.scrollTo(0,0);
}

renderList(POSTS);
</script>

</body>
</html>
