</div>

<p>

명상은 특별한 사람이 하는 수행이 아닙니다.

삶 속에서 자신을 알아가고
본래의 자리로 돌아가는 과정입니다.

우리는 끊임없이 바깥을 향해 달려가지만,

명상은 잠시 멈추어
이미 우리 안에 있는 고요를 발견하게 합니다.

깊은 숨이 시작되는 순간,
우리는 본래의 자리로 돌아가기 시작합니다.

</p>
