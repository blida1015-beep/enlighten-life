<h1>세상은 어떤 곳인가</h1>
<div class="subtitle">삶과 세계를 바라보는 시선</div>
<p>
세상은 단순히 살아내야 하는 장소가 아닙니다.<br><br>
우리를 비추고 흔들고 깨우는 거대한 거울입니다.<br><br>
우리는 세상 속에서 상처받고, 사랑하고, 길을 잃고,
다시 자신에게 돌아옵니다.<br><br>
세상은 때로 차갑지만,
그 안에는 우리를 깨우는 깊은 질서가 숨어 있습니다.
</p>
