<h1>세상은<br>어떤 곳인가</h1>

<div class="subtitle">
삶과 세계를 바라보는 시선
</div>

<p>
세상은 우리가 살아가는 공간인 동시에
우리 자신을 비추어 보는 거울입니다.
</p>

<p>
우리는 수많은 사람과 사건,
기쁨과 슬픔을 만나며 살아갑니다.
그 과정 속에서 자신을 알고
삶의 의미를 발견하게 됩니다.
</p>

<p>
세상은 두려움의 장소가 아니라
배움과 사랑이 피어나는 자리입니다.
삶은 언제나 우리를 더 깊은 이해와
깨어 있음으로 초대합니다.
</p>

<p>
우리가 세상을 바라보는 시선이 바뀌면
세상 역시 새로운 모습으로 열리기 시작합니다.
</p>
