<h1>사랑의 언어</h1>

<p>
사랑은 말보다 먼저 존재합니다.
</p>

<p>
누군가를 이해하려는 마음,
함께 머물러 주는 침묵,
기다림과 배려,
그 모든 것이 사랑의 언어입니다.
</p>

<p>
우리는 말로만 소통하지 않습니다.
존재 자체가 하나의 언어가 됩니다.
</p>

<p>
깊이 바라보고,
깊이 들어주고,
함께 있어 주는 것.

그것이 사랑의 언어입니다.
</p>
