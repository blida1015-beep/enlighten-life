<h1>통과의 기록</h1>

<p>
삶은 수많은 계절을 통과합니다.
</p>

<p>
기쁨도 지나가고,
슬픔도 지나가고,
상실과 아픔 또한 지나갑니다.
</p>

<p>
우리는 견디기 위해 태어난 존재가 아니라,
통과하며 성장하기 위해 이곳에 왔습니다.
</p>

<p>
불길을 지나온 자리에는
새로운 빛이 기다리고 있습니다.

그 모든 시간을 기억하며
오늘도 조용히 걸어갑니다.
</p>
